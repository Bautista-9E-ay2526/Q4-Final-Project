<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!--BOOTSTRAP-->    
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--EXTERNAL CSS-->    
        <link rel="stylesheet" href="style (login).css">

    <!--EXTERNAL JS-->
        <script src="main (login).js" defer></script>
</head>
<body>
    <form>
        <!--LOGO-->
        <img src="logo.png" alt="logo">
        
        <!--TITLE-->
        <h2>Login</h2>
        <br>

        <!--USERNAME-->
        <label for="user">Username</label>
        <input type="text" id="user" placeholder="Enter here">
        <br>

        <!--PASSWORD-->
        <label for="pass">Password</label>
        <input type="password" id="pass" placeholder="Enter here">
        <br>

        <!--BUTTONS-->
        <input type="checkbox" id="stay">Stay logged in 
        <p><span style="font-style: oblique;">Your session will stay active on this device</span></p>
        <br>
        <button type="button" id="login">Login</button>
        <button type="reset" id="reset">Cancel</button>
        <br>
        <br>

        <!--LOGIN DETAILS-->
        <details ontoggle="alert('LOGIN DETAILS: \nUser: Group6 \nPass: 143MSPASCO')">
            <summary class="btn btn-sm btn-outline-secondary md-3">Forget username / password?</summary>
            <p class="small text-muted">Enter the credentials shown in the alert box.</p>
        </details>
    </form>
    
</body>
</html>
